<div class="map-container">
  <div id="map"></div>
  <app-color-filter
    *ngIf="!isLoading"
    [colors]="colors"
    (activeColorsChange)="onActiveColorsChange($event)"
  />
  <div *ngIf="!isLoading && totalCount" class="hex-counter">
    {{ visibleCount }} / {{ totalCount }} hexagons
  </div>
  <div *ngIf="isLoading" class="loading">Loading...</div>
</div>
